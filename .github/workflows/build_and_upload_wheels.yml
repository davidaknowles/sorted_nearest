name: Build and upload to PyPI

# -----------------------------------------------------------------------------
# GLOBAL SETTINGS
# -----------------------------------------------------------------------------
env:
  # Drop both 3.6 and 3.7 wheels
  CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"

# Build on every push (branches & tags), PR update, and manual dispatch
on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Required for PyPI trusted publishing (OIDC – no API token needed)
permissions:
  id-token: write
  contents: read

# -----------------------------------------------------------------------------
# 1. Build wheels (all platforms)
# -----------------------------------------------------------------------------
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.18.1

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 7

# -----------------------------------------------------------------------------
# 2. Build sdist (Linux only)
# -----------------------------------------------------------------------------
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

# -----------------------------------------------------------------------------
# 3. Publish to PyPI (only when a tag starting with `v` is pushed, or manually)
# -----------------------------------------------------------------------------
  upload_pypi:
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sorted_nearest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
